<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>menospeso. — Sistema Clínico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fc;--sidebar:#0F172A;--sidebar-text:#94a3b8;--card:#fff;
  --border:#e5e7eb;--text:#0F172A;--muted:#6b7280;
  --accent:#059669;--accent-light:#D1FAE5;
  --ok:#059669;--ok-light:#D1FAE5;
  --warn:#d97706;--warn-light:#fffbeb;
  --err:#dc2626;--err-light:#fef2f2;
  --mblue:#E0F2FE;
  --sw:220px;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{display:flex;min-height:100vh}

/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--sidebar);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sb-logo{padding:16px 16px 14px;border-bottom:1px solid #1e293b}
.sb-logo .logo-mark{font-size:17px;letter-spacing:-0.5px;line-height:1}
.sb-logo .logo-menos{font-weight:800;color:#fff}
.sb-logo .logo-peso{font-weight:400;color:#fff}
.sb-logo .logo-dot{font-weight:400;color:#059669}
.sb-logo .logo-sub{font-size:10px;color:var(--sidebar-text);margin-top:4px;display:block;font-weight:400;letter-spacing:.02em}
.sb-patient{padding:10px 16px;background:#1e293b;border-bottom:1px solid #334155}
.sb-patient .pname{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-patient .pcpf{font-size:11px;color:var(--sidebar-text)}
.sb-nav{padding:6px 0;flex:1}
.nav-sec{font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.08em;padding:10px 16px 3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;color:var(--sidebar-text);font-size:13px;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{background:#1e293b;color:#fff}
.nav-item.active{background:#05966920;color:#34d399;border-left-color:#059669}
.nav-item .ic{width:16px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:#dc2626;color:#fff;font-size:10px;padding:1px 5px;border-radius:10px}
.sb-foot{padding:10px 16px;border-top:1px solid #1e293b;font-size:10px;color:#475569}

/* MAIN */
#main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:600;flex:1}
#content{padding:24px;flex:1}
#content.no-pad{padding:0}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* STATS */
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.stat-l{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.stat-v{font-size:22px;font-weight:700;margin-top:4px;line-height:1}
.stat-s{font-size:12px;color:var(--muted);margin-top:3px}
.stat.green{background:var(--ok-light);border-color:#bbf7d0}.stat.green .stat-v{color:var(--ok)}

/* FORMS */
.fg{margin-bottom:14px}
.fr{display:grid;gap:14px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:#fff;outline:none;transition:.15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(5,150,105,.12)}
textarea{resize:vertical;min-height:72px}
input:disabled{background:#f9fafb;color:var(--muted)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.15s;text-decoration:none;white-space:nowrap}
.btn:hover{opacity:.9}
.bp{background:var(--accent);color:#fff}
.bs{background:#f3f4f6;color:var(--text);border:1px solid var(--border)}
.bg{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.bg:hover{background:var(--accent-light)}
.bsm{padding:5px 10px;font-size:12px}
.blg{padding:12px 22px;font-size:14px}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.bg-gray{background:#f3f4f6;color:#6b7280}
.bg-blue{background:#dbeafe;color:#1d4ed8}
.bg-yellow{background:#fef9c3;color:#a16207}
.bg-green{background:#dcfce7;color:#16a34a}
.bg-red{background:#fee2e2;color:#dc2626}
.bg-orange{background:#fed7aa;color:#c2410c}

/* ALERT */
.alert{padding:11px 14px;border-radius:6px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.a-warn{background:var(--warn-light);border:1px solid #fcd34d;color:#92400e}
.a-info{background:var(--accent-light);border:1px solid #6ee7b7;color:#065f46}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* TIMELINE */
.tl-item{display:flex;gap:10px;padding-bottom:18px;position:relative}
.tl-item::before{content:'';position:absolute;left:14px;top:28px;bottom:0;width:2px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:28px;height:28px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--accent)}
.tl-body{flex:1;padding-top:3px}
.tl-title{font-size:13px;font-weight:500}
.tl-date{font-size:11px;color:var(--muted);margin-top:3px}

/* FILE */
.dropzone{border:2px dashed var(--border);border-radius:8px;padding:36px;text-align:center;cursor:pointer;transition:.2s}
.dropzone:hover,.dropzone.dz-over{border-color:var(--accent);background:var(--accent-light)}
.dz-ico{font-size:32px;margin-bottom:8px}
.dz-txt{font-size:13px;color:var(--muted)}
.fi{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:6px;margin-top:8px}
.fi-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-meta{font-size:11px;color:var(--muted);flex-shrink:0}

/* Q-LIST */
.qi{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:7px;margin-bottom:7px;background:var(--card)}
.qi-name{font-size:13px;font-weight:500;flex:1}

/* EVOLUÇÃO */
.ev-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.ev-head{padding:12px 16px;background:#f9fafb;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ev-body{padding:16px;border-top:1px solid var(--border)}
.ev-sec{margin-bottom:12px}
.ev-sec-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:3px}
.ev-text{font-size:13px;line-height:1.6}

/* SOAP */
.soap-l{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}

/* SEARCH */
.search-wrap{min-height:calc(100vh - 0px);display:flex;align-items:center;justify-content:center;padding:24px}
.search-box{width:100%;max-width:460px}
.sr{margin-top:10px;padding:13px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:.15s}
.sr:hover{border-color:var(--accent);background:var(--accent-light)}
.sr-name{font-weight:600;font-size:14px}
.sr-info{font-size:12px;color:var(--muted);margin-top:2px}

/* RESUMO CLÍNICO */
.resumo-box{background:#f0f5ff;border:1px solid #bfdbfe;border-radius:7px;padding:14px;font-size:13px;line-height:1.7}

/* PENDÊNCIAS */
.pend-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.pend-item:last-child{border:none}
.pend-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);flex-shrink:0}

/* ADESÃO */
.ad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ad-item{background:#f9fafb;border:1px solid var(--border);border-radius:7px;padding:12px}
.ad-l{font-size:11px;color:var(--muted);margin-bottom:6px}
.ad-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.ad-fill{height:100%;background:var(--accent);border-radius:3px;transition:.3s}
.ad-v{font-size:13px;font-weight:600;margin-top:5px}

/* MISC */
hr.div{border:none;border-top:1px solid var(--border);margin:18px 0}
.hidden{display:none!important}
.row{display:flex;align-items:center;gap:10px}
.sb{justify-content:space-between}
.muted{color:var(--muted);font-size:13px}
.mt{margin-top:16px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:600}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* CIDADE AUTOCOMPLETE */
.cidade-wrap{position:relative}
.cidade-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--accent);border-top:none;border-radius:0 0 7px 7px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.cidade-opt{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.cidade-opt:hover,.cidade-opt.selected{background:var(--accent-light)}
.cidade-opt .uf{font-size:11px;font-weight:600;color:var(--muted);background:#f3f4f6;padding:1px 5px;border-radius:4px}
.cidade-loading{padding:10px 12px;font-size:12px;color:var(--muted);font-style:italic}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:#111827;color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}

/* SYNC STATUS */
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.sync-ok{background:#16a34a}.sync-syncing{background:#d97706;animation:pulse .8s infinite}
.sync-err{background:#dc2626}.sync-off{background:#4b5563}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7280;margin-top:6px;padding-top:6px;border-top:1px solid #1f2937}

/* CONFIG */
.config-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.config-section h3{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0}
.setup-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.setup-step:last-child{border:none}
code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:12px;color:#1d4ed8}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sb-logo">
    <div class="logo-mark"><span class="logo-menos">menos</span><span class="logo-peso">peso</span><span class="logo-dot">.</span></div>

  <nav class="sb-nav">

      <div class="nav-sec">Paciente</div>
      <div class="nav-item" id="ni-dashboard" onclick="go('dashboard')"><span class="ic">📊</span>Dashboard</div>
      <div class="nav-item" id="ni-cadastro" onclick="go('cadastro')"><span class="ic">👤</span>Cadastro</div>
      <div class="nav-item" id="ni-questionarios" onclick="go('questionarios')"><span class="ic">📋</span>Questionários</div>
      <div class="nav-item" id="ni-exames" onclick="go('exames')"><span class="ic">🧪</span>Exames</div>
      <div class="nav-item" id="ni-timeline" onclick="go('timeline')"><span class="ic">📅</span>Timeline</div>

      <div class="nav-item" id="ni-adesao" onclick="go('adesao')"><span class="ic">🎯</span>Score de Adesão</div>
      <div class="nav-item" id="ni-relatorios" onclick="go('relatorios')"><span class="ic">📄</span>Relatórios</div>
      <div class="nav-item" id="ni-mensagens" onclick="go('mensagens')"><span class="ic">💬</span>Mensagens WA</div>

    <div class="nav-sec">Sistema</div>
    <div class="nav-item" id="ni-config" onclick="go('config')"><span class="ic">⚙️</span>Configurações</div>
  </nav>
  <div class="sb-foot">
    <div style="font-size:10px;margin-bottom:4px;letter-spacing:-0.3px"><span style="font-weight:700;color:#94a3b8">menos</span><span style="color:#94a3b8">peso</span><span style="color:#059669">.</span><span style="color:#475569"> v1.1</span></div>
    <div class="sync-bar">
      <span class="sync-dot sync-off" id="sync-dot"></span>
      <span id="sync-label">Sheets não configurado</span>
    </div>
    <button onclick="SYNC.pullAll()" style="margin-top:8px;width:100%;background:#1f2937;border:1px solid #374151;color:#9ca3af;padding:5px;border-radius:5px;font-size:11px;cursor:pointer">↓ Sincronizar agora</button>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <div id="topbar" class="topbar hidden">
    <div class="topbar-title" id="topbar-title"></div>
    <div style="display:flex;gap:8px">
      <button class="btn bs bsm" onclick="go('search')">← Trocar paciente</button>
      <button class="btn bp bsm" onclick="go('evolucoes-new')">+ Nova evolução</button>
    </div>

  <div id="content"></div>
</main>

</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script type="module">
  import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.min.mjs";
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4/build/pdf.worker.min.mjs";
  window.pdfjsLib = pdfjsLib;
</script>
<script>
// ═══════════════════════════════════════════════
// MENOSYSTEM  —  MVP v1.0
// Dados em localStorage, CPF como chave única
// ═══════════════════════════════════════════════

// ── DATA ──────────────────────────────────────
const DB = {
  KEY: 'menosys_v1',
  all(){ try{return JSON.parse(localStorage.getItem(this.KEY)||'{}')}catch{return{}} },
  save(data){ localStorage.setItem(this.KEY, JSON.stringify(data)) },
  norm(cpf){ return String(cpf).replace(/\D/g,'') },
  get(cpf){ return this.all()[this.norm(cpf)]||null },
  put(p){
    const d=this.all();
    d[this.norm(p.cpf)]=p;
    this.save(d);
    // Sincroniza com Sheets de forma assíncrona (não bloqueia a UI)
    if(typeof SYNC!=='undefined') SYNC.push(p);
  },
  search(q){
    const all=Object.values(this.all()), n=this.norm(q);
    return all.filter(p=>
      this.norm(p.cpf).startsWith(n)||
      (p.nome||'').toLowerCase().includes(q.toLowerCase())
    );
  },
  blank(cpf){
    return {
      cpf:this.norm(cpf),
      nome:'',dataNascimento:'',sexoBiologico:'',genero:'',estadoCivil:'',
      profissao:'',email:'',telefoneSms:'',whatsapp:'',contatoEmergencia:'',
      endereco:'',cidade:'',estado:'',cep:'',
      programaContratado:'',dataInicio:'',altura:'',pesoInicial:'',pesoAtual:'',
      medicacaoAtual:'',doseAtual:'',resumoClinico:'',queixaPrincipal:'',objetivoTratamento:'',
      hm:{doencas:'',cirurgias:'',internacoes:'',alergias:'',medicamentos:'',
          antecedenteFamiliar:'',tabagismo:'',alcool:'',cannabis:'',outrasDrogas:'',
          gestacao:'',ultimaMenstruacao:'',metodoContraceptivo:''},
      questionarios:[
        {id:'roda',nome:'Roda da Vida',status:'nao-enviado'},
        {id:'comp-ali',nome:'Comportamento Alimentar',status:'nao-enviado'},
        {id:'atv-fis',nome:'Atividade Física',status:'nao-enviado'},
        {id:'phq9',nome:'PHQ-9 (Depressão)',status:'nao-enviado'},
        {id:'gad7',nome:'GAD-7 (Ansiedade)',status:'nao-enviado'},
        {id:'sono',nome:'Sono',status:'nao-enviado'},
        {id:'comp-ali2',nome:'Competência Alimentar',status:'nao-enviado'},
        {id:'culin',nome:'Habilidades Culinárias',status:'nao-enviado'},
      ],
      exames:[],examesResultados:[],evolucoes:[],timeline:[],
      adesao:{medicamentosa:'',comparecimento:''},
      criadoEm:new Date().toISOString()
    };
  }
};

// ── IBGE — AUTOCOMPLETE DE CIDADES ────────────
const IBGE = {
  _data: null,
  _loading: false,
  _callbacks: [],

  async load(){
    if(this._data) return this._data;
    if(this._loading) return new Promise(r=>this._callbacks.push(r));
    this._loading = true;
    try {
      const r = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/municipios?orderBy=nome');
      const raw = await r.json();
      this._data = raw.map(m=>({
        nome: m.nome,
        uf:   m.microrregiao.mesorregiao.UF.sigla,
        estado: m.microrregiao.mesorregiao.UF.nome
      }));
    } catch(e){
      console.warn('[IBGE] Falha ao carregar cidades:', e);
      this._data = [];
    }
    this._loading = false;
    this._callbacks.forEach(r=>r(this._data));
    this._callbacks = [];
    return this._data;
  },

  search(q, max=8){
    if(!this._data||!q) return [];
    const ql = q.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    return this._data
      .filter(m=>{
        const mn = m.nome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
        return mn.startsWith(ql) || mn.includes(ql);
      })
      .slice(0,max);
  },

  // Renderiza widget de autocomplete dentro de um wrapper
  // inputId: id do input de texto
  // onSelect(cidade, uf, estado): callback ao selecionar
  mount(inputId, onSelect){
    const inp = document.getElementById(inputId);
    if(!inp) return;
    let ddId = inputId+'-dd';
    let activeIdx = -1;

    // Carrega em background
    this.load();

    inp.addEventListener('input', ()=>{
      const q = inp.value.trim();
      let dd = document.getElementById(ddId);
      if(q.length < 2){ if(dd) dd.remove(); return; }

      const results = this.search(q);
      if(!dd){
        dd = document.createElement('div');
        dd.id = ddId;
        dd.className = 'cidade-dropdown';
        inp.parentElement.appendChild(dd);
      }
      activeIdx = -1;

      if(!this._data){
        dd.innerHTML = '<div class="cidade-loading">Carregando cidades...</div>';
        this.load().then(()=>inp.dispatchEvent(new Event('input')));
        return;
      }

      if(!results.length){
        dd.innerHTML = '<div class="cidade-loading">Nenhuma cidade encontrada</div>';
        return;
      }

      dd.innerHTML = results.map((m,i)=>
        `<div class="cidade-opt" data-i="${i}" data-nome="${m.nome}" data-uf="${m.uf}" data-estado="${m.estado}">
          <span>${m.nome}</span><span class="uf">${m.uf}</span>
        </div>`
      ).join('');

      dd.querySelectorAll('.cidade-opt').forEach(el=>{
        el.addEventListener('mousedown', e=>{
          e.preventDefault();
          inp.value = el.dataset.nome;
          onSelect(el.dataset.nome, el.dataset.uf, el.dataset.estado);
          dd.remove();
        });
      });
    });

    inp.addEventListener('keydown', e=>{
      const dd = document.getElementById(ddId);
      if(!dd) return;
      const opts = dd.querySelectorAll('.cidade-opt');
      if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,opts.length-1); opts.forEach((o,i)=>o.classList.toggle('selected',i===activeIdx)); }
      if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); opts.forEach((o,i)=>o.classList.toggle('selected',i===activeIdx)); }
      if(e.key==='Enter'&&activeIdx>=0){ e.preventDefault(); opts[activeIdx].dispatchEvent(new MouseEvent('mousedown')); }
      if(e.key==='Escape'){ dd.remove(); activeIdx=-1; }
    });

    inp.addEventListener('blur', ()=>setTimeout(()=>document.getElementById(ddId)?.remove(),150));
  }
};

// ── SYNC (Google Sheets) ──────────────────────
// Configuração: cole a URL do Apps Script após implantar
const SYNC = {
  get url(){ return localStorage.getItem('menosys_sheets_url')||'https://script.google.com/macros/s/AKfycbzfDUlL_-nXkFtY1ty7Bu8-8VG06IPWdGyaNm88S2_Fg7QtNBAeqQnBY1_UyKT5Y5Hi/exec' },
  set url(v){ localStorage.setItem('menosys_sheets_url',v) },
  get key(){ return localStorage.getItem('menosys_sheets_key')||'MENOSYS_2025' },
  set key(v){ localStorage.setItem('menosys_sheets_key',v) },

  // Atualiza indicador visual
  setStatus(s, msg){
    const dot=document.getElementById('sync-dot');
    const lbl=document.getElementById('sync-label');
    if(!dot) return;
    dot.className='sync-dot sync-'+s;
    lbl.textContent=msg||{ok:'Sincronizado',syncing:'Sincronizando…',err:'Erro de sync',off:'Sheets não configurado'}[s]||s;
  },

  // Verifica se está configurado
  isConfigured(){ return !!this.url },

  // Envia um paciente para o Sheets (fire-and-forget)
  async push(patient){
    if(!this.isConfigured()) return;
    this.setStatus('syncing');
    try {
      const r = await fetch(this.url, {
        method:'POST', redirect:'follow',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ key: this.key, action:'save', patient })
      });
      const data = await r.json();
      if(data.ok){
        this.setStatus('ok');
      } else {
        console.error('[Sync] push error:', data.error);
        this.setStatus('err', 'Erro: '+data.error);
      }
    } catch(e){
      console.error('[Sync] push failed:', e);
      this.setStatus('err', 'Falha na conexão');
    }
  },

  // Busca um paciente do Sheets e atualiza localStorage
  async pull(cpf){
    if(!this.isConfigured()) return null;
    try {
      const url=`${this.url}?action=get&cpf=${cpf}&key=${encodeURIComponent(this.key)}`;
      const r = await fetch(url, {redirect:'follow'});
      const data = await r.json();
      if(data.ok && data.patient){
        DB.put(data.patient); // salva no localStorage
        return data.patient;
      }
    } catch(e){ console.error('[Sync] pull failed:', e); }
    return null;
  },

  // Importa todos os pacientes do Sheets
  async pullAll(){
    if(!this.isConfigured()){
      toast('Configure a URL do Google Sheets primeiro (⚙️ Configurações)');
      return;
    }
    this.setStatus('syncing','Importando…');
    try {
      const url=`${this.url}?action=all&key=${encodeURIComponent(this.key)}`;
      const r = await fetch(url, {redirect:'follow'});
      const data = await r.json();
      if(data.ok && data.patients){
        // Deduplica por CPF: mantém o registro mais completo (com questionário > com nome > mais recente)
        const map={};
        data.patients.forEach(p=>{
          const cpf=String(p.cpf||'').replace(/\D/g,'').padStart(11,'0');
          if(!cpf) return;
          p.cpf=cpf;
          const ex=map[cpf];
          if(!ex){ map[cpf]=p; return; }
          const pS=(p.questionarioRespondidoEm?10:0)+(p.nome?5:0)+(p.pesoAtual?2:0)+(p.hm?1:0);
          const eS=(ex.questionarioRespondidoEm?10:0)+(ex.nome?5:0)+(ex.pesoAtual?2:0)+(ex.hm?1:0);
          if(pS>eS) map[cpf]=p;
        });
        const uniq=Object.values(map);
        uniq.forEach(p=>DB.put(p));
        this.setStatus('ok',`${uniq.length} paciente(s) importado(s)`);
        toast(`✅ ${uniq.length} paciente(s) sincronizado(s) do Sheets`);
        // Se estiver na busca, recarrega
        if(V==='search') go('search');
      } else {
        this.setStatus('err', data.error||'Erro desconhecido');
        toast('Erro ao importar: '+(data.error||'verifique a URL e a chave'));
      }
    } catch(e){
      console.error('[Sync] pullAll failed:', e);
      this.setStatus('err','Falha na conexão');
      toast('Falha de conexão com o Sheets');
    }
  },

  // Testa a conexão
  async ping(){
    if(!this.isConfigured()) return false;
    try {
      const url=`${this.url}?action=ping&key=${encodeURIComponent(this.key)}`;
      const r = await fetch(url, {redirect:'follow'});
      const data = await r.json();
      return data.ok===true;
    } catch { return false; }
  },

  // Inicializa ao carregar a página
  init(){
    if(this.isConfigured()){
      this.setStatus('syncing','Verificando…');
      this.ping().then(ok=>{
        this.setStatus(ok?'ok':'err', ok?'Conectado ao Sheets':'Sheets inacessível');
      });
    }
  }
};

// ── HELPERS ───────────────────────────────────
function fmtCPF(c){ c=String(c).replace(/\D/g,''); return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4') }
function maskCPF(inp){
  let v=inp.value.replace(/\D/g,'').slice(0,11);
  v=v.replace(/(\d{3})(\d)/,'$1.$2');
  v=v.replace(/(\d{3})\.(\d{3})(\d)/,'$1.$2.$3');
  v=v.replace(/\.(\d{3})\.(\d{3})(\d)/,(m,a,b,c)=>'.'+a+'.'+b+'-'+c);
  inp.value=v;
}
function idade(dob){
  if(!dob) return '—';
  const t=new Date(),b=new Date(dob);
  let a=t.getFullYear()-b.getFullYear();
  if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--;
  return a;
}
function imc(peso,alt){
  if(!peso||!alt) return null;
  const v=parseFloat(peso)/(parseFloat(alt)/100)**2;
  return isNaN(v)?null:v.toFixed(1);
}
function classImc(v){
  const n=parseFloat(v);
  if(n<18.5) return 'Abaixo do peso';
  if(n<25) return 'Normal';
  if(n<30) return 'Sobrepeso';
  if(n<35) return 'Obesidade Grau I';
  if(n<40) return 'Obesidade Grau II';
  return 'Obesidade Grau III';
}
function jornada(di){
  if(!di) return '—';
  const d=Math.floor((new Date()-new Date(di))/86400000);
  return d>=0?`Dia ${d+1}`:'—';
}
function fmtDt(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtD(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR');
}
function bytes(b){
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function qBadge(s){
  const m={'nao-enviado':['bg-gray','Não enviado'],'enviado':['bg-blue','Enviado'],
    'respondido':['bg-yellow','Respondido'],'interpretado':['bg-green','Interpretado']};
  const [c,l]=m[s]||['bg-gray',s];
  return `<span class="badge ${c}">${l}</span>`;
}
function pendencias(p){
  const r=[];
  if(!p.nome) r.push('Cadastro incompleto — nome não preenchido');
  const qp=(p.questionarios||[]).filter(q=>q.status==='nao-enviado'||q.status==='enviado');
  if(qp.length) r.push(`${qp.length} questionário(s) pendente(s)`);
  if(!(p.exames||[]).length) r.push('Nenhum exame laboratorial anexado');
  if(!(p.evolucoes||[]).length) r.push('Nenhuma evolução registrada');
  if(!p.pesoInicial) r.push('Peso inicial não cadastrado');
  return r;
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2600);
}

  else if(DB.norm(q).length===11) novoP();
}

function sTab(id, btn){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['tp','tc','tprog'].forEach(x=>document.getElementById(x)?.classList.toggle('hidden',x!==id));
  if(id==='tp') mountCidadeInput();
}

function mountCidadeInput(){
  IBGE.mount('f-cid', (nome, uf, estado)=>{
    const ufEl = document.getElementById('f-uf');
    if(ufEl) ufEl.value = uf;
  });
}

// Ativa autocomplete ao renderizar cadastro (chamado por vCadastro via setTimeout)
function _initCadastroInputs(){ mountCidadeInput(); }

function savePessoal(){
  const p=P, wasMissing=!p.nome;
  p.nome=v('f-nome'); p.dataNascimento=v('f-dob'); p.sexoBiologico=v('f-sexo');
  // Gênero: se "Outro", usa o campo de texto livre
  const genSel=v('f-gen');
  p.genero = genSel==='Outro' ? (v('f-gen-outro')||'Outro') : genSel;
  p.pronomes=v('f-pronomes'); p.estadoCivil=v('f-ecivil'); p.profissao=v('f-prof');
  p.email=v('f-email'); p.telefoneSms=v('f-tel'); p.whatsapp=v('f-wapp');
  p.contatoEmergencia=v('f-emerg'); p.endereco=v('f-end'); p.cidade=v('f-cid');
  p.estado=v('f-uf'); p.cep=v('f-cep');
  TL.add(p,'cadastro', wasMissing&&p.nome?`Cadastro preenchido — ${p.nome}`:'Dados pessoais atualizados');
  P=p; refreshSb(); toast('Dados pessoais salvos!');
}
function saveClinico(){
  const p=P;
  p.queixaPrincipal=v('f-queixa'); p.objetivoTratamento=v('f-obj');
  p.hm.doencas=v('f-doe'); p.hm.cirurgias=v('f-cir'); p.hm.internacoes=v('f-int');
  p.hm.alergias=v('f-ale'); p.hm.medicamentos=v('f-med'); p.hm.antecedenteFamiliar=v('f-ant');
  p.hm.tabagismo=v('f-tab'); p.hm.alcool=v('f-alc'); p.hm.cannabis=v('f-can');
  p.hm.outrasDrogas=v('f-drog'); p.hm.gestacao=v('f-gest');
  p.hm.ultimaMenstruacao=v('f-mens'); p.hm.metodoContraceptivo=v('f-contra');
  TL.add(p,'cadastro','Avaliação clínica atualizada');
  P=p; toast('Avaliação clínica salva!');
}
function saveProg(){
  const p=P;
  p.programaContratado=v('f-prog'); p.dataInicio=v('f-ini');
  p.altura=v('f-alt'); p.pesoInicial=v('f-pi'); p.pesoAtual=v('f-pa');
  p.medicacaoAtual=v('f-meda'); p.doseAtual=v('f-dose');
  TL.add(p,'sistema',`Dados do programa atualizados — ${p.programaContratado||'sem programa'}`);
  P=p; refreshSb(); toast('Dados do programa salvos!');
}
function v(id){ const el=document.getElementById(id); return el?el.value:''; }
function refreshSb(){
  const s=document.getElementById('sb-patient');
  if(P) s.innerHTML=`<div class="pname">${P.nome||'Paciente sem nome'}</div><div class="pcpf">${fmtCPF(P.cpf)}</div>`;
}

// QUESTIONÁRIOS
function vQs(ct){
  const p=P;
  ct.innerHTML=`
  <div class="card">
    <div class="sec-head">
      <div class="sec-title">Questionários (${p.questionarios.length})</div>
      <button class="btn bg bsm" onclick="addQ()">+ Adicionar</button>
    </div>
    ${p.questionarios.map((q,i)=>`
      <div class="qi">
        <span>📋</span>
        <div class="qi-name">${q.nome}</div>
        ${qBadge(q.status)}
        <select class="btn bs bsm" style="cursor:pointer" onchange="updQ(${i},this.value)">
          <option value="nao-enviado" ${q.status==='nao-enviado'?'selected':''}>Não enviado</option>
          <option value="enviado" ${q.status==='enviado'?'selected':''}>Enviado</option>
          <option value="respondido" ${q.status==='respondido'?'selected':''}>Respondido</option>
          <option value="interpretado" ${q.status==='interpretado'?'selected':''}>Interpretado</option>
        </select>
      </div>`).join('')}
  </div>
  <div class="alert a-info">ℹ️ Futuramente os questionários serão enviados via WhatsApp e respondidos pelo próprio paciente.</div>`;
}
function updQ(i,s){
  const p=P, q=p.questionarios[i], old=q.status;
  q.status=s;
  if(s!==old && s!=='nao-enviado') TL.add(p,'questionario',`Questionário "${q.nome}" marcado como ${s}`);
  else DB.put(p);
  toast('Status atualizado');
}
function addQ(){
  const nome=prompt('Nome do questionário:');
  if(!nome) return;
  P.questionarios.push({id:Date.now()+'',nome,status:'nao-enviado'});
  DB.put(P); vQs(document.getElementById('content'));
}

  {id:'tgp',nome:'TGP / ALT',unidade:'U/L',min:0,max:41,re:/(?:tgp|alt)[^\d]{0,30}?(\d{1,3}(?:[.,]\d+)?)/i},
  {id:'acido-urico',nome:'Ácido Úrico',unidade:'mg/dL',min:2.5,max:6.0,re:/[aá]cido\s*[uú]rico[^\d]{0,30}?(\d{1,2}[.,]\d{1,2})/i},
  {id:'vit-d',nome:'Vitamina D (25-OH)',unidade:'ng/mL',min:30,max:100,re:/vitamina\s*d[^\d]{0,30}?(\d{1,3}(?:[.,]\d+)?)/i},
  {id:'vit-b12',nome:'Vitamina B12',unidade:'pg/mL',min:200,max:900,re:/vitamina\s*b\s*12[^\d]{0,30}?(\d{2,4}(?:[.,]\d+)?)/i},
  {id:'ferritina',nome:'Ferritina',unidade:'ng/mL',min:20,max:250,re:/ferritina[^\d]{0,30}?(\d{1,4}(?:[.,]\d+)?)/i},
  {id:'hemoglobina',nome:'Hemoglobina',unidade:'g/dL',min:12,max:17,re:/hemoglobina[^\d]{0,30}?(\d{1,2}[.,]\d{1,2})/i},
  {id:'leucocitos',nome:'Leucócitos',unidade:'/mm³',min:4000,max:11000,re:/leuc[oó]citos[^\d]{0,30}?([\d.]{3,7})/i},
  {id:'plaquetas',nome:'Plaquetas',unidade:'/mm³',min:150000,max:450000,re:/plaquetas[^\d]{0,30}?([\d.]{3,8})/i},
  {id:'insulina',nome:'Insulina',unidade:'µU/mL',min:2,max:25,re:/insulina[^\d]{0,30}?(\d{1,3}(?:[.,]\d+)?)/i},
  {id:'pcr',nome:'PCR (Proteína C Reativa)',unidade:'mg/L',min:0,max:5,re:/\bpcr\b[^\d]{0,30}?(\d{1,3}(?:[.,]\d+)?)/i},
];

function parseLabText(text){
  if(!text) return [];
  const norm = text.replace(/\r/g,'');
  const out=[];
  LAB_PARAMS.forEach(def=>{
    const m = def.re.exec(norm);
    if(!m) return;
    const valorNum = parseFloat(m[1].replace(/\.(?=\d{3}\b)/g,'').replace(',','.'));
    if(isNaN(valorNum)) return;
    const alterado = valorNum < def.min || valorNum > def.max;
    out.push({param:def.id, nome:def.nome, valor:valorNum, unidade:def.unidade, faixaRef:`${def.min}–${def.max}`, alterado});
  });
  return out;
}

async function ocrImageFile(file){
  const { data } = await Tesseract.recognize(file, 'por');
  return data.text || '';
}

async function ocrPdfFile(file){
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data: buf}).promise;
  let fullText = '';
  const maxPages = Math.min(pdf.numPages, 5);
  for(let i=1;i<=maxPages;i++){
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    const pageText = tc.items.map(it=>it.str).join(' ').trim();
    if(pageText.length > 30){
      fullText += pageText + '\n';
    } else {
      const viewport = page.getViewport({scale:2});
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({canvasContext:ctx, viewport}).promise;
      const { data } = await Tesseract.recognize(canvas, 'por');
      fullText += (data.text||'') + '\n';
    }
  }
  return fullText;
}

function setExStatus(cpf, exId, patch){
  const p = DB.get(cpf);
  if(!p) return;
  const ex = (p.exames||[]).find(e=>e.id===exId);
  if(!ex) return;
  Object.assign(ex, patch);
  DB.put(p);
  if(typeof P!=='undefined' && P && P.cpf===p.cpf){
    P = p;
    if(V==='exames') vExames(document.getElementById('content'));
    if(V==='dashboard') vDash(document.getElementById('content'));
  }
}

function checkIdentidade(text, p){
  if(!text || !p) return {ok:true};
  const norm = text.replace(/\r/g,'');
  let cpfOk = null, cpfTxt = null;
  const mCpf = norm.match(/CPF[:\s]*([\d.\-]{11,14})/i);
  if(mCpf){
    cpfTxt = mCpf[1].replace(/\D/g,'');
    if(cpfTxt.length===11 && p.cpf){
      cpfOk = (cpfTxt === String(p.cpf).replace(/\D/g,''));
    }
  }
  let dobOk = null, dobTxt = null;
  const mDob = norm.match(/(?:Dt\.?\s*Nasc|Data\s*de\s*Nascimento)[.:\s]*(\d{2}\/\d{2}\/\d{4})/i);
  if(mDob){
    const partes = mDob[1].split('/');
    dobTxt = partes[2]+'-'+partes[1]+'-'+partes[0];
    if(p.dataNascimento){
      dobOk = (dobTxt === p.dataNascimento);
    }
  }
  const ok = (cpfOk!==false) && (dobOk!==false);
  return {ok, cpfOk, dobOk, cpfTxt, dobTxt};
}

async function processExameOCR(cpf, exId, file){
  setExStatus(cpf, exId, {ocrStatus:'processando'});
  try {
    let text = '';
    if(file.type === 'application/pdf'){
      text = await ocrPdfFile(file);
    } else if(file.type.startsWith('image/')){
      text = await ocrImageFile(file);
    } else {
      setExStatus(cpf, exId, {ocrStatus:'ignorado'});
      return;
    }
    const p = DB.get(cpf);
    if(!p) return;
    const ex = (p.exames||[]).find(e=>e.id===exId);
    if(!ex) return;
    const ident = checkIdentidade(text, p);
    if(!ident.ok){
      ex.ocrStatus = 'paciente-divergente';
      ex.ocrTexto = text.slice(0,5000);
      let msg = 'O laudo não confere com o cadastro: ';
      if(ident.cpfOk===false) msg += `CPF do laudo ${ident.cpfTxt} ≠ cadastro ${fmtCPF(p.cpf)}. `;
      if(ident.dobOk===false) msg += `Nascimento do laudo ${ident.dobTxt.split('-').reverse().join('/')} ≠ cadastro ${(p.dataNascimento||'').split('-').reverse().join('/')}. `;
      msg += 'Verifique antes de usar os valores.';
      ex.ocrAlerta = msg;
      DB.put(p);
      if(typeof P!=='undefined' && P && P.cpf===p.cpf){
        P = p;
        if(V==='exames') vExames(document.getElementById('content'));
        if(V==='dashboard') vDash(document.getElementById('content'));
      }
      toast('⚠ Atenção: dados do exame não conferem com o paciente');
      return;
    }
    const valores = parseLabText(text);
    ex.ocrStatus = valores.length ? 'concluido' : 'sem-parametros';
    ex.ocrTexto = text.slice(0,5000);
    if(!p.examesResultados) p.examesResultados=[];
    valores.forEach(v=>{
      p.examesResultados.push({
        id: Date.now()+Math.random().toString(36).slice(2),
        exameId: exId, param:v.param, nome:v.nome, valor:v.valor, unidade:v.unidade,
        faixaRef:v.faixaRef, alterado:v.alterado,
        data: ex.data, origem:'ocr'
      });
    });
    DB.put(p);
    if(typeof P!=='undefined' && P && P.cpf===p.cpf){
      P = p;
      if(V==='exames') vExames(document.getElementById('content'));
      if(V==='dashboard') vDash(document.getElementById('content'));
    }
    toast(valores.length ? `Exame lido: ${valores.length} valor(es) extraído(s)` : 'Exame lido, mas nenhum parâmetro reconhecido');
  } catch(e){
    console.warn('[OCR] Falha ao processar exame:', e);
    setExStatus(cpf, exId, {ocrStatus:'erro', ocrTexto:String(e&&e.message||e)});
    toast('Não foi possível ler o exame automaticamente');
  }
}function ocrBadge(s, alerta){
  const m={pendente:['bg-gray','Aguardando'],processando:['bg-yellow','Lendo...'],concluido:['bg-green','Lido'],'sem-parametros':['bg-yellow','Lido (sem valores)'],erro:['bg-red','Erro na leitura'],'paciente-divergente':['bg-red','⚠ Paciente divergente']};
  if(!s||!m[s]) return '';
  const tip = alerta ? ` title="${String(alerta).replace(/"/g,'&quot;')}"` : '';
  return `<span class="badge ${m[s][0]}" style="margin-left:6px"${tip}>${m[s][1]}</span>`;
}

      ${datas.map(d=>`<th style="text-align:center;padding:6px;border-bottom:2px solid var(--border)">${fmtD(d)}</th>`).join('')}

    <tbody>

      ${datas.map(d=>{

}

function editResultado(i,campo,valor){
  const r=P.examesResultados[i];
  if(!r) return;
  if(campo==='valor') r.valor=parseFloat(String(valor).replace(',','.'));
  else if(campo==='data') r.data=valor?new Date(valor).toISOString():r.data;
  else r[campo]=valor;
  r.origem='manual';
  DB.put(P);
}
function delResultado(i){
  P.examesResultados.splice(i,1);
  DB.put(P);
  document.getElementById('modal-resultados')?.remove();
  abrirEdicaoResultados();
}
function addResultadoManual(){
  const nome=prompt('Nome do parâmetro (ex: Glicemia de jejum):');
  if(!nome) return;
  const valor=parseFloat((prompt('Valor:')||'').replace(',','.'));
  if(isNaN(valor)){ toast('Valor inválido'); return; }
  const unidade=prompt('Unidade (ex: mg/dL):')||'';
  if(!P.examesResultados) P.examesResultados=[];
  P.examesResultados.push({id:Date.now()+Math.random().toString(36).slice(2),param:'manual-'+Date.now(),nome,valor,unidade,faixaRef:'',alterado:false,data:new Date().toISOString(),origem:'manual'});
  DB.put(P);
  document.getElementById('modal-resultados')?.remove();
  abrirEdicaoResultados();
}

function getCat(){ const r=document.querySelector('input[name="cat"]:checked'); return r?r.value:'laboratorial'; }
function onDrop(e){
  e.preventDefault();
  document.getElementById('dz')?.classList.remove('dz-over');
  onFiles(e.dataTransfer.files);
}
function onFiles(files){
  if(!files||!files.length) return;
  const p=P, cat=getCat();
  if(!p.exames) p.exames=[];
  const novos=[];
  Array.from(files).forEach(f=>{
    const podeOcr = cat==='laboratorial' && (f.type==='application/pdf' || f.type.startsWith('image/'));
    const ex={id:Date.now()+Math.random().toString(36).slice(2),nome:f.name,cat,tam:bytes(f.size),tipo:f.type,data:new Date().toISOString(),ocrStatus:podeOcr?'pendente':null};
    p.exames.push(ex);
    if(podeOcr) novos.push({ex,f});
    TL.add(p,cat==='bioimpedancia'?'bioimpedancia':'exame',`Exame anexado: ${f.name}`);
  });
  P=p; DB.put(p); toast(`${files.length} arquivo(s) adicionado(s)!`);
  vExames(document.getElementById('content'));
  novos.forEach(({ex,f})=>processExameOCR(p.cpf, ex.id, f));
}
function rmExame(id){
  if(!confirm('Remover este arquivo?')) return;
  P.exames=(P.exames||[]).filter(e=>e.id!==id);
  P.examesResultados=(P.examesResultados||[]).filter(r=>r.exameId!==id);
  DB.put(P); vExames(document.getElementById('content'));
}

const _MEMED_SCRIPT_URL = 'https://integrations.memed.com.br/modulos/plataforma.sinapse-prescricao/build/sinapse-prescricao.min.js';

async function _getMemedToken() {
  // 1. Tenta via Apps Script (backend seguro) se configurado
  if (SYNC.isConfigured()) {
    try {
      const url = `${SYNC.url}?action=memed-token&key=${encodeURIComponent(SYNC.key)}`;
      const r   = await fetch(url, { redirect: 'follow' });
      const d   = await r.json();
      if (d.ok && d.token) return d;
    } catch(e) { console.warn('[Memed] Backend falhou, tentando direto:', e.message); }
  }

  // 2. Fallback: chama API Memed diretamente do browser (homologação)
  const base    = 'https://integrations.api.memed.com.br/v1/sinapse-prescricao/usuarios';
  const qs      = `?api-key=${_MEMED_API_KEY}&secret-key=${_MEMED_SECRET_KEY}`;
  const headers = { 'Accept': 'application/vnd.api+json', 'Content-Type': 'application/json' };

  // Tenta buscar prescritor existente
  try {
    const r = await fetch(`${base}/${_MEMED_CPF}${qs}`, { headers });
    const d = await r.json();
    const token = d?.data?.attributes?.token;
    if (token) return { ok: true, token, scriptUrl: _MEMED_SCRIPT_URL };
  } catch(e) { console.warn('[Memed] GET direto falhou:', e.message); }

  // Cadastra prescritor se não encontrado
  try {
    const payload = JSON.stringify({ data: { type: 'usuarios', attributes: {
      external_id: _MEMED_CPF, nome: 'Ailton', sobrenome: 'Vieira', cpf: _MEMED_CPF,
      board: { board_code: 'CRM', board_number: '52628', board_state: 'MG' },
      email: 'menospesosaudedigital@gmail.com', sexo: 'M', data_nascimento: '28/05/1987'
    }}});
    const r = await fetch(`${base}${qs}`, { method: 'POST', headers, body: payload });
    const d = await r.json();
    const token = d?.data?.attributes?.token;
    if (token) return { ok: true, token, scriptUrl: _MEMED_SCRIPT_URL };
    return { ok: false, error: JSON.stringify(d) };
  } catch(e) { return { ok: false, error: e.message }; }
}

async function openMemed(btn) {
  if (!P) { toast('Selecione um paciente primeiro'); return; }

  const orig = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = 'Carregando…'; }

  try {
    const d = await _getMemedToken();
    if (!d.ok) { toast('Erro Memed: ' + (d.error || 'token não obtido')); return; }

    // Se o módulo já está carregado, só abre e seta paciente
    if (_memedReady && window.MdHub) {
      await _memedSetPaciente();
      MdHub.module.show('plataforma.prescricao');
      return;
    }

    // Remove script anterior e carrega novo com o token atualizado
    const old = document.getElementById('memed-script');
    if (old) old.remove();
    _memedReady = false;

    const s = document.createElement('script');
    s.id  = 'memed-script';
    s.src = d.scriptUrl;
    s.setAttribute('data-token', d.token);
    s.setAttribute('data-color', '#059669');
    document.head.appendChild(s);

    // Aguarda o módulo de prescrição inicializar
    await new Promise((resolve) => {
      const waitScript = () => {
        if (window.MdSinapsePrescricao) {
          MdSinapsePrescricao.event.add('core:moduleInit', async function(module) {
            if (module.name === 'plataforma.prescricao') {
              _memedReady = true;
              await _memedSetPaciente();
              MdHub.module.show('plataforma.prescricao');
              MdSinapsePrescricao.event.add('core:prescricaoImpressa', _memedSalvarReceita);
              resolve();
            }
          });
        } else {
          setTimeout(waitScript, 200);
        }
      };
      waitScript();
    });

  } catch(e) {
    console.error('[Memed]', e);
    toast('Erro ao abrir prescrição: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}

async function _memedSetPaciente() {
  const p = P;
  if (!p || !window.MdHub) return;

  // Converte data nascimento de YYYY-MM-DD para DD/MM/YYYY
  let dob = '';
  if (p.dataNascimento) {
    const pts = p.dataNascimento.split('-');
    if (pts.length === 3) dob = `${pts[2]}/${pts[1]}/${pts[0]}`;
  }

  const dados = {
    idExterno: p.cpf,
    nome:      p.nome || '',
    cpf:       p.cpf  || '',
  };
  if (dob)          dados.data_nascimento = dob;
  if (p.sexo)       dados.sexo   = p.sexo === 'M' ? 'Masculino' : 'Feminino';
  if (p.whatsapp)   dados.telefone = p.whatsapp.replace(/\D/g,'');
  if (p.email)      dados.email   = p.email;
  if (p.pesoAtual)  dados.peso    = parseFloat(p.pesoAtual);
  if (p.alturaM)    dados.altura  = parseFloat(p.alturaM);

  await MdHub.command.send('plataforma.prescricao', 'setPaciente', dados);
}

function _memedSalvarReceita(prescricao) {
  if (!P) return;
  const agora = new Date().toISOString();
  P.receitas  = P.receitas  || [];
  P.timeline  = P.timeline  || [];

  P.receitas.push({
    em:       agora,
    descricao:'Receita emitida via Memed',
    link:     prescricao?.link || '',
    id:       prescricao?.id   || ''
  });
  P.timeline.push({
    tipo:  'receita',
    texto: 'Receita emitida via Memed',
    em:    agora,
    link:  prescricao?.link || ''
  });

  DB.put(P);
  SYNC.push(P);
  toast('Receita salva no prontuário');
}

          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Abrir WhatsApp
        </a>
      </div>
    </div>
  </div>`;

  // CAMPOS por ocasião
  const fieldSets={
    cadastro:`<div style="color:var(--muted);font-size:13px;padding:12px 0">✅ Mensagem gerada automaticamente com o link de avaliação.<br><br>Revise o preview ao lado e envie!</div>`,
    avaliacao:`<div style="color:var(--muted);font-size:13px;padding:12px 0">✅ Mensagem com o link do questionário gerada automaticamente.<br><br>Revise o preview ao lado e envie!</div>`,
    consulta:`
      <div class="fg"><label>💊 Medicação prescrita</label><input id="wa-med" placeholder="Ex: Semaglutida 0,5mg 1x/semana" oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit"></div>
      <div class="fg"><label>📋 Orientações</label><textarea id="wa-ori" placeholder="Ex: Manter dieta com déficit calórico, beber 2L de água..." oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;min-height:90px;resize:vertical"></textarea></div>
      <div class="fg"><label>📅 Próxima consulta</label><input id="wa-prox" placeholder="Ex: 15/07/2026 às 14h" oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit"></div>`,
    progresso:`
      <div class="fg"><label>📆 Mês na jornada</label><input id="wa-mes" type="number" min="1" max="24" placeholder="Ex: 3" oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit"></div>
      <div class="fg"><label>💬 Mensagem motivacional</label><textarea id="wa-motiv" placeholder="Ex: Você está arrasando! Mais 2kg e chegamos na meta!" oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;min-height:80px;resize:vertical">Continue assim! Cada passo conta na sua jornada. 💪</textarea></div>`,
    pendencia:`
      <div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px">Pendências detectadas automaticamente:</div>
        ${pends.length?pends.map(p=>`<div style="font-size:12px;background:#fef9c3;border:1px solid #fde047;border-radius:6px;padding:6px 10px;margin-bottom:4px">${p}</div>`).join(''):'<div style="font-size:12px;color:var(--muted)">Nenhuma pendência automática detectada.</div>'}
      </div>
      <div class="fg"><label>➕ Pendência adicional (opcional)</label><input id="wa-pend-extra" placeholder="Ex: Enviar foto da balança esta semana" oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit"></div>
      <div class="fg"><label>⏰ Prazo para resolução</label><input id="wa-prazo" placeholder="Ex: sexta-feira (26/06)" oninput="reRender()" style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit"></div>`,
  };

  window._waTemplates=templates;
  window._waOcSel=null;

  window.selOc=function(id){
    window._waOcSel=id;
    document.querySelectorAll('[id^="oc-"]').forEach(el=>{
      const isActive=el.id===`oc-${id}`;
      el.style.borderColor=isActive?'#059669':'var(--border)';
      el.style.background=isActive?'#D1FAE5':'var(--card)';
    });
    document.getElementById('wa-fields').innerHTML=fieldSets[id]||'';
    render(id);
  };

  window.reRender=function(){
    if(window._waOcSel) render(window._waOcSel);
  };

  // Copiar padrão
  document.getElementById('wa-copy').onclick=()=>toast('Selecione uma ocasião primeiro');
}

// CONFIGURAÇÕES
function vConfig(ct){
  const url = SYNC.url;
  const key = SYNC.key;
  const configured = SYNC.isConfigured();

  ct.innerHTML=`
  <div class="config-section">
    <h3>Status da Conexão</h3>
    <div style="display:flex;align-items:center;gap:10px;padding:12px;background:#f9fafb;border-radius:7px;margin-bottom:12px">
      <span class="sync-dot ${configured?'sync-ok':'sync-off'}" style="width:12px;height:12px"></span>
      <span style="font-size:13px">${configured?'Google Sheets configurado':'Não configurado — dados salvos apenas localmente'}</span>
    </div>
    <button class="btn bp bsm" onclick="testConn()">🔌 Testar conexão</button>
    <span id="ping-result" style="font-size:12px;margin-left:10px;color:var(--muted)"></span>
  </div>

  <div class="config-section">
    <h3>Como Configurar</h3>
    <div class="setup-step"><span class="step-num">1</span><div>Abra <a href="https://script.google.com" target="_blank" style="color:var(--accent)">script.google.com</a> → <strong>Novo projeto</strong></div></div>
    <div class="setup-step"><span class="step-num">2</span><div>Cole o conteúdo do arquivo <code>apps-script.gs</code> no editor. Altere o valor de <code>SECRET_KEY</code> para uma senha sua.</div></div>
    <div class="setup-step"><span class="step-num">3</span><div>Clique em <strong>Implantar → Nova implantação → App da Web</strong><br>
      Executar como: <strong>Eu</strong> · Quem tem acesso: <strong>Qualquer pessoa</strong></div></div>
    <div class="setup-step"><span class="step-num">4</span><div>Copie a <strong>URL do app da Web</strong> gerada e cole abaixo</div></div>
    <div class="setup-step"><span class="step-num">5</span><div>O sistema passará a salvar automaticamente no Google Sheets a cada alteração</div></div>
  </div>

  <div class="config-section">
    <h3>Credenciais</h3>
    <div class="fg">
      <label>URL do Apps Script (Web App URL)</label>
      <input type="url" id="cfg-url" value="${url}" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="fg">
      <label>Chave secreta (deve ser igual ao SECRET_KEY no apps-script.gs)</label>
      <input type="text" id="cfg-key" value="${key}" placeholder="MENOSYS_2025">
    </div>
    <div class="row" style="gap:8px">
      <button class="btn bp" onclick="saveConfig()">💾 Salvar configuração</button>
      ${configured?`<button class="btn bs" onclick="if(confirm('Remover configuração do Sheets?')){SYNC.url='';SYNC.key='MENOSYS_2025';SYNC.setStatus('off');go('config')}">Remover</button>`:''}
    </div>
  </div>

  <div class="config-section">
    <h3>Dados Locais</h3>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">
      ${Object.keys(DB.all()).length} paciente(s) no cache local.
    </div>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button class="btn bg bsm" onclick="SYNC.pullAll()">⬇️ Importar tudo do Sheets</button>
      <button class="btn bs bsm" onclick="exportLocal()">📤 Exportar JSON local</button>
      <button class="btn bs bsm" onclick="importLocal()">📥 Importar JSON</button>
    </div>
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="onImport(this)">
  </div>`;
}

function saveConfig(){
  const url = v('cfg-url').trim();
  const key = v('cfg-key').trim();
  if(!url){ toast('URL obrigatória'); return; }
  SYNC.url = url;
  SYNC.key = key || 'MENOSYS_2025';
  toast('Configuração salva! Testando conexão…');
  testConn();
}

async function testConn(){
  const result = document.getElementById('ping-result');
  if(result) result.textContent = 'Testando…';
  if(!SYNC.isConfigured()){ if(result) result.textContent='URL não configurada'; return; }
  const ok = await SYNC.ping();
  if(result) result.textContent = ok ? '✅ Conexão OK!' : '❌ Falha — verifique a URL e a chave';
  SYNC.setStatus(ok?'ok':'err');
  if(ok) toast('✅ Conexão com o Sheets estabelecida!');
  else toast('❌ Falha na conexão — verifique URL e chave secreta');
}

function exportLocal(){
  const data = DB.all();
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `menosys-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Backup exportado!');
}

function importLocal(){ document.getElementById('import-file')?.click(); }

function onImport(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const count = Object.keys(data).length;
      if(!confirm(`Importar ${count} paciente(s)? Dados existentes serão mesclados.`)) return;
      const all = DB.all();
      Object.assign(all, data);
      DB.save(all);
      toast(`${count} paciente(s) importado(s)!`);
      go('config');
    } catch { toast('Arquivo JSON inválido'); }
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────
go('search');
// Inicializa sync ao carregar
setTimeout(()=>SYNC.init(), 500);
</script>
</body>
</html>
