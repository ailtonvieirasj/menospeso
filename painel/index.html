<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menos Peso — Painel</title>
<style>
:root{
  --accent:#059669;--accent-hlight:#d1fae5;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --bg:#f8fafc;--card:#ffffff;--radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;border:none;font-family:inherit}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px}
.brand-logo{font-size:38px;font-weight:800;letter-spacing:-1.5px;line-height:1;text-align:center}
.brand-logo span{font-weight:400;color:var(--accent)}
.brand-sub{color:var(--muted);font-size:13px;margin-top:4px;text-align:center}
.pin-label{font-size:14px;font-weight:600;color:var(--muted);text-align:center}
.pin-dots{display:flex;gap:14px;justify-content:center}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:.15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-error{color:#dc2626;font-size:13px;text-align:center;min-height:18px}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-btn{width:72px;height:72px;border-radius:50%;background:white;border:1.5px solid var(--border);font-size:22px;font-weight:500;color:var(--text);transition:.1s}
.pin-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.pin-btn:active{transform:scale(.92)}
.pin-btn.zero{grid-column:2}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column}
.app-header{background:white;border-bottom:1px solid var(--border);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header-brand{font-size:17px;font-weight:700;letter-spacing:-.3px}
.app-header-brand span{font-weight:400;color:var(--accent)}
.app-header-right{display:flex;align-items:center;gap:10px}
.btn-logout{font-size:12px;color:var(--muted);padding:5px 12px;border-radius:6px;background:var(--bg);border:1px solid var(--border);transition:.12s}
.btn-logout:hover{color:var(--text);border-color:var(--text)}
.app-nav{background:white;border-bottom:1px solid var(--border);display:flex;padding:0 18px;gap:2px;overflow-x:auto}
.nav-btn{padding:10px 14px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;margin-bottom:-1px;transition:.15s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.app-body{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}

/* ── CARDS ── */
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.module-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.15s}
.module-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(5,150,105,.08)}
.mc-icon{font-size:30px;margin-bottom:10px}
.mc-title{font-size:15px;font-weight:700;margin-bottom:3px}
.mc-sub{font-size:12px;color:var(--muted);line-height:1.4}
.mc-count{font-size:22px;font-weight:700;color:var(--accent);margin-top:8px}

/* ── SECTION ── */
.sec-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.sec-title{font-size:18px;font-weight:700}
.sec-sub{font-size:13px;color:var(--muted);margin-top:2px}

/* ── FILTER BAR ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;background:white;border:1.5px solid var(--border);color:var(--muted);cursor:pointer;transition:.12s;white-space:nowrap}
.chip:hover,.chip.on{background:var(--accent);border-color:var(--accent);color:white}
.search-inp{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:220px}
.search-inp:focus{border-color:var(--accent)}

/* ── PARTNER CARDS ── */
.partner-list{display:grid;gap:9px}
.pcard{background:white;border:1.5px solid var(--border);border-radius:9px;padding:13px 15px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:.12s}
.pcard:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(5,150,105,.06)}
.p-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-size:14px;font-weight:600}
.p-handle{font-size:12px;color:var(--muted)}
.p-spec{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}

/* ── STATUS ── */
.sc{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.s0{background:#f1f5f9;color:#64748b}
.s1{background:#fef9c3;color:#854d0e}
.s2{background:#dcfce7;color:#15803d}
.s3{background:#fee2e2;color:#dc2626}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:12px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-hd{padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-sub{font-size:12px;color:var(--muted);margin-top:2px}
.modal-x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1;padding:0 2px}
.modal-bd{padding:18px 20px}
.m-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.m-sec{margin-bottom:16px}
.msg-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap;font-family:inherit;color:var(--text)}
.dica{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;font-size:12px;color:#854d0e;line-height:1.5}
.status-row{display:flex;gap:7px;flex-wrap:wrap}
.s-btn{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:white;color:var(--muted);cursor:pointer;transition:.12s}
.s-btn.on{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.notes-ta{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;outline:none}
.notes-ta:focus{border-color:var(--accent)}
.m-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* ── BUTTONS ── */
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.12s;border:none}
.btn-green{background:var(--accent);color:white}
.btn-green:hover{background:#047857}
.btn-outline{background:white;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-wa{background:#25d366;color:white}
.btn-wa:hover{background:#1ebe5a}

/* ── TASKS ── */
.add-task{display:flex;gap:8px;margin-bottom:14px}
.add-task input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.add-task input:focus{border-color:var(--accent)}
.task-list{display:grid;gap:8px}
.task-item{background:white;border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:11px}
.t-check{width:17px;height:17px;border-radius:4px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.t-text{font-size:13px;flex:1}
.t-text.done{text-decoration:line-through;color:var(--muted)}
.t-date{font-size:11px;color:var(--muted);white-space:nowrap}
.t-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 2px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.loading{text-align:center;padding:32px;color:var(--muted);font-size:13px}
.group-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}

/* ── TOAST ── */
.toast-ct{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:#1e293b;color:white;padding:9px 18px;border-radius:8px;font-size:13px;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.hidden{display:none!important}
@media(max-width:600px){
  .app-body{padding:14px}
  .module-grid{grid-template-columns:1fr 1fr}
  .search-inp{width:100%}
  .m-actions{flex-direction:column}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div>
    <div class="brand-logo">menos<span>peso</span>.</div>
    <div class="brand-sub">Painel Administrativo</div>
  </div>
  <div class="pin-label" id="pin-label">Digite seu PIN de 4 dígitos</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>

    <button class="pin-btn" onclick="pd(6)">6</button>
    <button class="pin-btn" onclick="pd(7)">7</button>
    <button class="pin-btn" onclick="pd(8)">8</button>
    <button class="pin-btn" onclick="pd(9)">9</button>
    <button class="pin-btn zero" onclick="pd(0)">0</button>
    <button class="pin-btn" onclick="pbk()" style="font-size:18px">⌫</button>

</div>

<!-- ── APP ── -->
<div id="app">
  <header class="app-header">
    <div class="app-header-brand">menos<span>peso</span>. <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">Painel</span></div>
    <div class="app-header-right">
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>
  <nav class="app-nav">
    <button class="nav-btn" data-view="dashboard" onclick="goV('dashboard')">🏠 Início</button>
    <button class="nav-btn" data-view="parcerias" onclick="goV('parcerias')">🤝 Parcerias</button>
    <button class="nav-btn" data-view="tarefas"   onclick="goV('tarefas')">✅ Tarefas</button>
    <button class="nav-btn" data-view="clinica"   onclick="goV('clinica')">🩺 Clínica</button>
    <button class="nav-btn" data-view="financeiro" onclick="goV('financeiro')">💰 Financeiro</button>
  </nav>
  <div class="app-body" id="body"></div>
</div>

<div class="toast-ct" id="toast-ct"></div>

<script>
// ── CONSTANTS ────────────────────────────────────────
const SHEET_ID='1_R-Zcp4KasjOiGLMhXxbO9x9kVZlpwB3KcXE7_EvlBg';
const PIN_KEY='mp_pin_v1';
const DAT_KEY='mp_data_v1';

const CATS=[
  {id:'personal',  label:'Personal Trainers',       sheet:'Personal Trainers',       emoji:'🏋️'},
  {id:'nutri',     label:'Nutricionistas',           sheet:'Nutricionistas',          emoji:'🥗'},
  {id:'fisio',     label:'Fisioterapeutas',          sheet:'Fisioterapeutas',         emoji:'🦴'},
  {id:'medicos',   label:'Médicos e Especialistas',  sheet:'Médicos e Especialistas', emoji:'🏥'},
  {id:'psico',     label:'Psicólogos',               sheet:'Psicólogos',              emoji:'🧠'},
  {id:'seguid',    label:'Seguidores @menospeso',    sheet:'Seguidores @menospeso',   emoji:'👥'},
];

const TMPLS={
  nutri:{
    msg:`Oi [nome]! Sou o Dr. Ailton, Médico de Família e Nutrólogo. Estou lançando o Menos Peso, meu programa de emagrecimento online. Acho que temos públicos muito complementares — às vezes os seus pacientes precisam de acompanhamento médico e os meus precisam de orientação nutricional mais especializada. Que tal a gente criar uma rede de indicações? Adoraria te apresentar o Menos Peso e ver como posso apoiar o seu trabalho também.`,
    dica:`Mencione a especialidade específica do nutri (esportivo, bariátrico, funcional etc.)`
  },
  personal:{
    msg:`Oi [nome]! Sou o Dr. Ailton, Médico de Família. Tenho um programa de emagrecimento online chamado Menos Peso que complementa muito o trabalho de personal trainers — cuido da parte médica, hormonal e metabólica enquanto o treino faz o resto. Muitos dos seus alunos podem precisar de um acompanhamento médico junto. Podemos criar uma parceria de indicações? Tô aqui pra te apoiar também.`,
    dica:`Se o personal tem foco em emagrecimento, mencione isso especificamente. Se atende 60+, mencione a importância da avaliação médica antes do treino.`
  },
  fisio:{
    msg:`Oi [nome]! Sou o Dr. Ailton, Médico de Família. Você provavelmente atende muitos pacientes com dores articulares relacionadas ao excesso de peso. Tenho um programa de emagrecimento online, o Menos Peso, e adoraria que você o conhecesse — pode ser muito útil para seus pacientes. E se você precisar indicar um médico de família para acompanhar seus pacientes, estou aqui! Vamos conversar?`,
    dica:`Se o fisio trabalha com idosos, mencione que você também atende essa faixa etária e tem experiência em emagrecimento seguro para 60+.`
  },
  medicos:{
    msg:`Oi [nome], tudo bem? Sou o Dr. Ailton, Médico de Família e Nutrólogo. Estou lançando o Menos Peso, programa de emagrecimento online. Sei que você atende pacientes com questões hormonais e metabólicas complexas — e às vezes eles precisam de um médico de família para o acompanhamento longitudinal. Gostaria de criar uma rede de indicações mútuas. Conheça o Menos Peso!`,
    dica:`Enfatize a complementaridade: você faz o acompanhamento clínico global enquanto o especialista gerencia sua área específica.`
  },
  psico:{
    msg:`Oi [nome]! Sou o Dr. Ailton, Médico de Família. Tenho um programa de emagrecimento online, o Menos Peso, e sei que muitos dos seus pacientes lidam com questões emocionais ligadas à alimentação e ao corpo. Quero criar uma rede de cuidado integrado — você cuida da mente, eu cuido do corpo. Se algum dia precisar indicar um médico de confiança aos seus pacientes, me considera! Adoraria te apresentar o programa.`,
    dica:`Para psicólogos com foco LGBTQIA+, mencione que você também atende esse público, gerando conexão imediata.`
  },
  seguid:{
    msg:`Oi [nome]! Sou o Dr. Ailton, Médico de Família e Nutrólogo. Vi que você me segue no Instagram — fico muito feliz com isso! Criei o Menos Peso, um programa de emagrecimento online, e pelo que vi do seu perfil acho que temos públicos muito complementares. Podemos criar uma parceria de divulgação? Adoraria conversar!`,
    dica:`Personalize mencionando algo do perfil: especialidade, foco do conteúdo ou localização.`
  },
};

const STATUSES=['Não contatado','Em contato','Parceria ativa','Descartado'];
const S_CLS  =['s0','s1','s2','s3'];

// ── LOCAL DATA ───────────────────────────────────────
function ld(){ try{return JSON.parse(localStorage.getItem(DAT_KEY)||'{}')}catch{return{}} }
function sv(d){ localStorage.setItem(DAT_KEY,JSON.stringify(d)) }
function pget(h){ const d=ld(); return d.p?.[h]||{} }
function pset(h,patch){ const d=ld(); if(!d.p)d.p={}; d.p[h]={...d.p[h],...patch}; sv(d) }
function getTasks(){ return ld().tasks||[] }
function setTasks(t){ const d=ld(); d.tasks=t; sv(d) }

// ── CSV PARSER ───────────────────────────────────────
function parseCSV(txt){
  const rows=[];let row=[],f='',q=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){ if(q&&txt[i+1]==='"'){f+='"';i++;}else q=!q; }
    else if(c===','&&!q){ row.push(f);f=''; }
    else if((c==='\n'||c==='\r')&&!q){
      if(f||row.length){row.push(f);rows.push(row);} row=[];f='';
      if(c==='\r'&&txt[i+1]==='\n')i++;
    } else f+=c;
  }
  if(f||row.length){row.push(f);rows.push(row);}
  return rows;
}
function csv2obj(txt){
  const rows=parseCSV(txt); if(rows.length<2)return[];
  const h=rows[0];
  return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k.trim()]=r[i]||'');return o})
    .filter(o=>Object.values(o).some(v=>v));
}

// ── PIN ──────────────────────────────────────────────
let pin='';
let appOpen=false;

function pd(n){
  if(pin.length>=4)return;
  pin+=String(n); updDots();
  if(pin.length===4)setTimeout(checkPin,80);
}
function pbk(){ pin=pin.slice(0,-1); updDots(); document.getElementById('pin-err').textContent=''; }
function updDots(){ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pin.length); }

function checkPin(){
  const stored=localStorage.getItem(PIN_KEY);
  if(!stored){
    localStorage.setItem(PIN_KEY,btoa(pin));
    document.getElementById('pin-label').textContent='PIN definido com sucesso!';
    setTimeout(enterApp,300);
  } else if(btoa(pin)===stored){
    enterApp();
  } else {
    document.getElementById('pin-err').textContent='PIN incorreto. Tente novamente.';
    pin=''; updDots();
  }
}
function enterApp(){
  appOpen=true;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  goV('dashboard');
}
function logout(){
  appOpen=false;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  pin=''; updDots();
  document.getElementById('pin-label').textContent=localStorage.getItem(PIN_KEY)?'Digite seu PIN':'Crie um PIN de 4 dígitos';
  document.getElementById('pin-err').textContent='';
}

// ── ROUTER ───────────────────────────────────────────
function goV(v){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  const ct=document.getElementById('body');
  ({dashboard:vDash,parcerias:vParc,tarefas:vTar,clinica:vClin,financeiro:vFin})[v]?.(ct);
}

// ── DASHBOARD ────────────────────────────────────────
function vDash(ct){
  const tasks=getTasks();
  const pend=tasks.filter(t=>!t.done).length;
  const dat=ld();
  const cont=Object.values(dat.p||{}).filter(p=>p.status&&p.status!=='Não contatado').length;
  const today=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  ct.innerHTML=`
  <div class="sec-header">
    <div>
      <div class="sec-title">Bom dia, Dr. Ailton 👋</div>
      <div class="sec-sub">${today}</div>
    </div>
  </div>
  <div class="module-grid">
    <div class="module-card" onclick="goV('parcerias')">
      <div class="mc-icon">🤝</div>
      <div class="mc-title">Parcerias</div>
      <div class="mc-sub">CRM de parceiros e divulgadores</div>
      <div class="mc-count">${cont} contato${cont!==1?'s':''}</div>
    </div>
    <div class="module-card" onclick="goV('tarefas')">
      <div class="mc-icon">✅</div>
      <div class="mc-title">Tarefas</div>
      <div class="mc-sub">Pendências e lembretes do programa</div>
      <div class="mc-count">${pend} pendente${pend!==1?'s':''}</div>
    </div>
    <div class="module-card" onclick="goV('clinica')">
      <div class="mc-icon">🩺</div>
      <div class="mc-title">Clínica</div>
      <div class="mc-sub">Menosystem — prontuários e atendimentos</div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">Abre o sistema →</div>
    </div>
    <div class="module-card" onclick="goV('financeiro')">
      <div class="mc-icon">💰</div>
      <div class="mc-title">Financeiro</div>
      <div class="mc-sub">Consolidado Mercado Pago</div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">Em desenvolvimento</div>
    </div>
  </div>
  ${pend>0?`
  <div style="margin-top:28px">
    <div style="font-size:14px;font-weight:700;margin-bottom:10px">Tarefas pendentes</div>
    <div class="task-list">
      ${tasks.filter(t=>!t.done).slice(0,6).map(t=>`
        <div class="task-item">
          <input type="checkbox" class="t-check" onchange="doneT('${t.id}',this.checked)">
          <div class="t-text">${esc(t.text)}</div>
          <div class="t-date">${t.date||''}</div>
        </div>`).join('')}
    </div>
    ${pend>6?`<div style="font-size:12px;color:var(--muted);margin-top:6px">+${pend-6} mais em Tarefas</div>`:''}
  </div>`:''}`;
}

// ── PARCERIAS ────────────────────────────────────────
let pcache={};   // catId → partner[]
let pcat='personal', pstat='todos', pq='';

async function vParc(ct){
  ct.innerHTML=`
  <div class="sec-header">
    <div>
      <div class="sec-title">Parcerias</div>
      <div class="sec-sub">CRM de parceiros para divulgação do Menos Peso</div>
    </div>
  </div>
  <div class="filter-row" id="cat-row">
    ${CATS.map(c=>`<div class="chip${c.id===pcat?' on':''}" onclick="setCat('${c.id}')">${c.emoji} ${c.label}</div>`).join('')}
  </div>
  <div class="filter-row">
    <input class="search-inp" placeholder="Nome ou @instagram..." oninput="pSearch(this.value)" value="${esc(pq)}">
  </div>
  <div class="filter-row" id="stat-row">
    ${['todos',...STATUSES].map((s,i)=>`<div class="chip${s===pstat?' on':''}" onclick="setStat('${s}')">${s==='todos'?'Todos':s}</div>`).join('')}
  </div>
  <div id="plist"><div class="loading">Carregando parceiros...</div></div>`;

  await loadCat(pcat);
  renderP();
}

async function loadCat(id){
  if(pcache[id]) return;
  const cat=CATS.find(c=>c.id===id);
  if(!cat){pcache[id]=[];return;}
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(cat.sheet)}`);
    if(!r.ok)throw new Error(r.status);
    const objs=csv2obj(await r.text());
    pcache[id]=objs.map(o=>{
      // Normalize across different sheet schemas
      const handle=o['@Instagram']||o[Object.keys(o)[0]]||'';
      const nome  =o['Nome Completo']||o['Nome']||'';
      const spec  =o['Especialidade']||o['Categoria']||'';
      const prio  =o['Prioridade']||'';
      const sstat =o['Status do Contato']||o['Status']||'Não contatado';
      const obs   =o['Observações']||o['Observações Estratégicas']||'';
      const seg   =o['Seguidores']||'';
      const aval  =o['Avaliação']||'';
      const verif =o['Verificado']||'';
      return {handle,nome,spec,prio,sstat,obs,seg,aval,verif,catId:id};
    }).filter(p=>p.handle);
  } catch(e){
    pcache[id]=[];
    console.error('[parcerias]',e);
  }
}

function getPartners(){
  return (pcache[pcat]||[]).map(p=>{
    const loc=pget(p.handle);
    return {...p, status:loc.status||p.sstat, notes:loc.notes!==undefined?loc.notes:p.obs};
  });
}

function renderP(){
  const el=document.getElementById('plist'); if(!el)return;
  let list=getPartners();
  if(pstat!=='todos') list=list.filter(p=>p.status===pstat);
  if(pq) list=list.filter(p=>p.nome.toLowerCase().includes(pq.toLowerCase())||p.handle.toLowerCase().includes(pq.toLowerCase()));
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum parceiro encontrado</div></div>`;
    return;
  }
  el.innerHTML=`<div class="partner-list">${list.map(pCard).join('')}</div>`;
}

function pCard(p){
  const init=(p.nome||p.handle).replace('@','').slice(0,2).toUpperCase();
  const si=STATUSES.indexOf(p.status); const sc=S_CLS[si<0?0:si];
  const prioC=p.prio.includes('Alta')?'#dc2626':p.prio.includes('édia')?'#d97706':'#16a34a';
  const h=p.handle.replace(/'/g,'&#39;');
  return `
  <div class="pcard" onclick="openP('${h}')">
    <div class="p-avatar">${init}</div>
    <div class="p-info">
      <div class="p-name">${esc(p.nome)||esc(p.handle)}</div>
      <div class="p-handle">${esc(p.handle)}${p.seg?' · '+fmtN(p.seg)+' seg.':''}</div>
      <div class="p-spec">${esc(p.spec)}</div>
    </div>
    <div class="p-meta">
      <span class="sc ${sc}">${p.status}</span>
      ${p.prio?`<span style="font-size:11px;font-weight:600;color:${prioC}">${esc(p.prio)}</span>`:''}
    </div>
  </div>`;
}

function setCat(id){
  pcat=id; pq=''; pstat='todos';
  vParc(document.getElementById('body'));
}
function setStat(s){
  pstat=s;
  document.querySelectorAll('#stat-row .chip').forEach((c,i)=>c.classList.toggle('on',['todos',...STATUSES][i]===s));
  renderP();
}
function pSearch(q){ pq=q; renderP(); }

function openP(handle){
  const all=getPartners();
  const p=all.find(x=>x.handle===handle); if(!p)return;
  const tpl=TMPLS[p.catId]||TMPLS.nutri;
  const first=(p.nome||handle).split(' ')[0];
  const msg=tpl.msg.replace(/\[nome\]/g,first);
  const si=STATUSES.indexOf(p.status);

  const d=document.createElement('div');
  d.className='overlay'; d.id='pm';
  d.innerHTML=`
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-title">${esc(p.nome||p.handle)}</div>
        <div class="modal-sub">${esc(p.handle)}${p.spec?' · '+esc(p.spec):''}${p.verif&&p.verif.includes('Sim')?' · ✅':''}</div>
      </div>
      <button class="modal-x" onclick="closeP()">×</button>
    </div>
    <div class="modal-bd">
      ${p.seg||p.aval||p.prio?`
      <div style="display:flex;gap:20px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
        ${p.seg?`<div><div style="font-size:17px;font-weight:700">${fmtN(p.seg)}</div><div style="font-size:11px;color:var(--muted)">Seguidores</div></div>`:''}
        ${p.aval?`<div><div style="font-size:15px">${esc(p.aval)}</div><div style="font-size:11px;color:var(--muted)">Avaliação</div></div>`:''}
        ${p.prio?`<div><div style="font-size:13px;font-weight:600">${esc(p.prio)}</div><div style="font-size:11px;color:var(--muted)">Prioridade</div></div>`:''}
      </div>`:`${p.prio?`<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Prioridade: <strong>${esc(p.prio)}</strong></div>`:''}`}

      <div class="m-sec">
        <div class="m-label">Status do Contato</div>
        <div class="status-row">
          ${STATUSES.map((s,i)=>`<button class="s-btn${i===si?' on':''}" onclick="updStat('${handle}','${s}',this)">${s}</button>`).join('')}
        </div>
      </div>

      <div class="m-sec">
        <div class="m-label">Mensagem Sugerida</div>
        <div class="msg-box">${esc(msg)}</div>
      </div>

      <div class="m-sec">
        <div class="m-label">Dica de personalização</div>
        <div class="dica">💡 ${esc(tpl.dica)}</div>
      </div>

      <div class="m-sec">
        <div class="m-label">Observações</div>
        <textarea class="notes-ta" id="pnotes" onblur="saveNotes('${handle}',this.value)">${esc(p.notes||'')}</textarea>
      </div>

      <div class="m-actions">
        <button class="btn btn-wa"      onclick="sendWA('${handle}')">💬 WhatsApp</button>
        <button class="btn btn-outline" onclick="copyM('${handle}')">📋 Copiar mensagem</button>
        <button class="btn btn-outline" onclick="openIG('${handle}')">📷 Instagram</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(d);
  d.addEventListener('click',e=>{ if(e.target===d)closeP(); });
}

function closeP(){ document.getElementById('pm')?.remove(); }

function updStat(handle,status,btn){
  pset(handle,{status});
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderP();
  toast('Status atualizado');
}
function saveNotes(handle,notes){ pset(handle,{notes}); }

function sendWA(handle){
  const p=getPartners().find(x=>x.handle===handle);
  const tpl=TMPLS[p?.catId||'nutri'];
  const first=(p?.nome||handle).split(' ')[0];
  const msg=tpl.msg.replace(/\[nome\]/g,first);
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function copyM(handle){
  const p=getPartners().find(x=>x.handle===handle);
  const tpl=TMPLS[p?.catId||'nutri'];
  const first=(p?.nome||handle).split(' ')[0];
  const msg=tpl.msg.replace(/\[nome\]/g,first);
  navigator.clipboard.writeText(msg).then(()=>toast('Mensagem copiada!'));
}
function openIG(handle){
  window.open('https://instagram.com/'+handle.replace('@',''),'_blank');
}

// ── TAREFAS ──────────────────────────────────────────
function vTar(ct){ renderTar(ct); }

function renderTar(ct){
  ct=ct||document.getElementById('body');
  const tasks=getTasks();
  const pend=tasks.filter(t=>!t.done);
  const done=tasks.filter(t=>t.done);
  ct.innerHTML=`
  <div class="sec-header"><div class="sec-title">Tarefas</div></div>
  <div class="add-task">
    <input id="ti" placeholder="Nova tarefa..." onkeydown="if(event.key==='Enter')addT()">
    <button class="btn btn-green" onclick="addT()">+ Adicionar</button>
  </div>
  <div class="task-list">
    ${pend.length===0&&done.length===0?`<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">Nenhuma tarefa. Tudo em dia!</div></div>`:''}
    ${pend.map(t=>`
      <div class="task-item">
        <input type="checkbox" class="t-check" onchange="doneT('${t.id}',this.checked)">
        <div class="t-text">${esc(t.text)}</div>
        <div style="display:flex;gap:6px;align-items:center">
          <div class="t-date">${t.date||''}</div>
          <button class="t-del" onclick="delT('${t.id}')">×</button>
        </div>
      </div>`).join('')}
    ${done.length?`
      <div class="group-label">Concluídas</div>
      ${done.map(t=>`
        <div class="task-item" style="opacity:.45">
          <input type="checkbox" class="t-check" checked onchange="doneT('${t.id}',this.checked)">
          <div class="t-text done">${esc(t.text)}</div>
          <button class="t-del" onclick="delT('${t.id}')">×</button>
        </div>`).join('')}`:''}
  </div>`;
  setTimeout(()=>document.getElementById('ti')?.focus(),50);
}
function addT(){
  const inp=document.getElementById('ti');
  const text=(inp?.value||'').trim(); if(!text)return;
  const tasks=getTasks();
  tasks.unshift({id:Date.now().toString(),text,done:false,date:new Date().toLocaleDateString('pt-BR')});
  setTasks(tasks); renderTar();
}
function doneT(id,done){ setTasks(getTasks().map(t=>t.id===id?{...t,done}:t)); setTimeout(renderTar,150); }
function delT(id){ setTasks(getTasks().filter(t=>t.id!==id)); renderTar(); }

// ── UTILS ────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtN(n){ return parseInt(n||0).toLocaleString('pt-BR'); }

function toast(msg,ms=2200){
  const ct=document.getElementById('toast-ct');
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  ct.appendChild(t); setTimeout(()=>t.remove(),ms);
}

// ── KEYBOARD (PIN) ───────────────────────────────────
window.addEventListener('keydown',e=>{
  if(appOpen) return;
  if(e.key>='0'&&e.key<='9') pd(parseInt(e.key));
  else if(e.key==='Backspace') pbk();
});

// ── INIT ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  const hasPIN=!!localStorage.getItem(PIN_KEY);
  document.getElementById('pin-label').textContent=hasPIN?'Digite seu PIN':'Crie um PIN de 4 dígitos';
});
